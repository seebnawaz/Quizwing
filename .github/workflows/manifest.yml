name: Auto-regenerate manifest.json

on:
  push:
    branches: [main]
    paths:
      - 'content/**/*.json'
      - '!content/manifest.json'

permissions:
  contents: write

jobs:
  manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Regenerate manifest
        run: node scripts/manifest.js

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain content/manifest.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add content/manifest.json
            git commit -m "chore: auto-regenerate manifest"
            git push
          else
            echo "manifest.json unchanged — nothing to commit"
          fi
